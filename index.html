<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 💛</title>

  <!-- FUENTE -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet">

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --dark-color: #000;
    }

    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--dark-color);
      overflow: hidden;
    }

    .message {
      background: #fce700;
      bottom: 50px;
      font-family: "Poppins", sans-serif;
      font-size: 28px;
      font-weight: 800;
      padding: 15px;
      position: absolute;
      opacity: 0;
      animation: fadeIn 2s forwards;
      animation-delay: 3s;
      border-radius: 10px;
      text-align: center;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* Fondo bonito simple */
    .night {
      position: fixed;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #001, #000);
    }

    /* FLORES SIMPLES (para que funcione rápido) */
    .flower {
      position: absolute;
      bottom: 0;
      width: 10px;
      height: 100px;
      background: green;
      left: 50%;
      transform: translateX(-50%);
    }

    .flower::before {
      content: "";
      position: absolute;
      top: -20px;
      left: -15px;
      width: 40px;
      height: 40px;
      background: yellow;
      border-radius: 50%;
    }

  </style>
</head>

<body>

  <!-- MUSICA AUTOMATICA -->
  <audio autoplay loop>
    <source src="https://files.catbox.moe/8l7s5g.mp3" type="audio/mpeg">
  </audio>

  <div class="night"></div>

  <div class="flower"></div>

  <div class="message">
    para ti Dra foquita 🦭<br>
    se que no es mucho pero algo es algo 💛
  </div>

</body>
</html>
