<script>
const audio = document.getElementById("music");

function fadeInAudio(){
  audio.volume = 0;
  audio.play();

  let vol = 0;
  const fade = setInterval(() => {
    if(vol < 1){
      vol += 0.02;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

document.addEventListener("click", fadeInAudio);
</script>
