<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 🌼</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
  color:white;
  font-family:sans-serif;
}

/* FLORES SIMPLES PERO BONITAS */
.flower{
  font-size:60px;
  animation: float 3s infinite ease-in-out;
}

.flower:nth-child(2){ animation-delay:0.5s; }
.flower:nth-child(3){ animation-delay:1s; }

@keyframes float{
  0%{ transform:translateY(0);}
  50%{ transform:translateY(-20px);}
  100%{ transform:translateY(0);}
}

.message{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<!-- 🌼 FLORES -->
<div>
  <div class="flower">🌼</div>
  <div class="flower">🌼</div>
  <div class="flower">🌼</div>
</div>

<!-- 💬 MENSAJE -->
<div class="message">
Estas flores amarillas son para ti Dra foquita se que no es mucho pero algo es algo jdahkda 🦭
</div>

<!-- 🎵 AUDIO -->
<audio id="music" loop>
  <source src="Mac Miller - Planet God Damn (feat. Njomza).mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");

document.addEventListener("click", () => {
  audio.volume = 0;
  audio.play();

  let vol = 0;
  const fade = setInterval(()=>{
    if(vol < 1){
      vol += 0.05;
      audio.volume = vol;
    } else clearInterval(fade);
  },200);
});
</script>

</body>
</html>
