<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores</title>

<style>
/* ===== TU CSS ===== */
*,*::after,*::before{padding:0;margin:0;box-sizing:border-box;}
:root{--dark-color:#000;}

body{
display:flex;
align-items:flex-end;
justify-content:center;
min-height:100vh;
background-color:var(--dark-color);
overflow:hidden;
perspective:1000px;
}

/* MENSAJE */
.message{
background:#fce700;
bottom:50px;
font-family:Poppins,sans-serif;
font-size:40px;
font-weight:800;
height:60px;
line-height:1;
padding:10px;
position:absolute;
opacity:0;
animation:fadeIn 1s forwards;
animation-delay:2s;
}

@keyframes fadeIn{to{opacity:1;}}

/* ===== RESTO DEL CSS DE FLORES ===== */
/* (tu CSS funciona igual, no lo modifiqué) */

/* ===== AUDIO FADE ===== */
audio{
display:none;
}
</style>

</head>

<body>

<!-- AUDIO -->
<audio id="music" autoplay loop>
<source src="https://raw.githubusercontent.com/USUARIO/REPO/main/Mac%20Miller%20-%20Planet%20God%20Damn%20(feat.%20Njomza).mp3" type="audio/mpeg">
</audio>

<!-- ===== TU HTML ===== -->
<div class="night"></div>

<div class="flowers">

<div class="flower flower--1">
<div class="flower__leafs flower__leafs--1">
<div class="flower__leaf flower__leaf--1"></div>
<div class="flower__leaf flower__leaf--2"></div>
<div class="flower__leaf flower__leaf--3"></div>
<div class="flower__leaf flower__leaf--4"></div>
<div class="flower__white-circle"></div>
</div>
<div class="flower__line"></div>
</div>

<div class="flower flower--2">
<div class="flower__leafs flower__leafs--2">
<div class="flower__leaf flower__leaf--1"></div>
<div class="flower__leaf flower__leaf--2"></div>
<div class="flower__leaf flower__leaf--3"></div>
<div class="flower__leaf flower__leaf--4"></div>
<div class="flower__white-circle"></div>
</div>
<div class="flower__line"></div>
</div>

<div class="flower flower--3">
<div class="flower__leafs flower__leafs--3">
<div class="flower__leaf flower__leaf--1"></div>
<div class="flower__leaf flower__leaf--2"></div>
<div class="flower__leaf flower__leaf--3"></div>
<div class="flower__leaf flower__leaf--4"></div>
<div class="flower__white-circle"></div>
</div>
<div class="flower__line"></div>
</div>

</div>

<div class="message">Estas flores amarillas son para ti Dra foquita se que no es mucho pero algo es algo</div>

<script>

/* ===== AUTOPLAY + FADE IN ===== */

const audio = document.getElementById("music");

audio.volume = 0;

window.addEventListener("load", () => {

audio.play().catch(()=>{});

let fade = setInterval(() => {
if(audio.volume < 1){
audio.volume = Math.min(audio.volume + 0.02,1);
}else{
clearInterval(fade);
}
},120);

});

</script>

</body>
</html>
