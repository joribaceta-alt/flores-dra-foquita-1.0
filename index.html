<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores amarillas 🌼</title>

<style>

/* RESET */
*,
*::after,
*::before{
padding:0;
margin:0;
box-sizing:border-box;
}

:root{
--dark-color:#000;
}

body{
display:flex;
align-items:flex-end;
justify-content:center;
min-height:100vh;
background-color:var(--dark-color);
overflow:hidden;
perspective:1000px;
font-family:sans-serif;
}

/* FONDO NOCHE */

.night{
position:fixed;
left:50%;
top:0;
transform:translateX(-50%);
width:100%;
height:100%;
filter:blur(0.1vmin);
background-image:
radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
radial-gradient(ellipse at bottom, var(--dark-color), rgba(145,233,255,0.2)),
repeating-linear-gradient(220deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
repeating-linear-gradient(189deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
repeating-linear-gradient(148deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
linear-gradient(90deg, rgb(21,255,0), rgb(240,240,240));
}

/* CONTENEDOR FLORES */

.flowers{
position:relative;
transform:scale(0.9);
}

/* MENSAJE */

.message{
background:#fce700;
bottom:50px;
font-size:40px;
font-weight:800;
padding:12px;
position:absolute;
opacity:0;
animation:fadeIn 1s forwards;
animation-delay:2s;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* FLOR */

.flower{
position:absolute;
bottom:10vmin;
transform-origin:bottom center;
z-index:10;
--fl-speed:0.8s;
}

/* TALLO */

.flower__line{
height:55vmin;
width:1.5vmin;
background-image:
linear-gradient(to left, rgba(0,0,0,0.2), transparent, rgba(255,255,255,0.2)),
linear-gradient(to top, transparent 10%, #064600, #064600);
box-shadow:inset 0 0 2px rgba(0,0,0,0.5);
animation:grow-flower-tree 4s backwards;
}

@keyframes grow-flower-tree{
0%{
height:0;
border-radius:1vmin;
}
}

/* PETALOS */

.flower__leafs{
position:relative;
animation:blooming-flower 2s backwards;
}

.flower__leaf{
position:absolute;
bottom:0;
left:50%;
width:8vmin;
height:11vmin;
border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
background-image:linear-gradient(to top,#fce700,#fce700);
transform-origin:bottom center;
opacity:0.9;
box-shadow:inset 0 0 2vmin rgba(255,255,255,0.5);
}

@keyframes blooming-flower{
0%{
transform:scale(0);
}
}

/* LUCES */

.flower__light{
position:absolute;
bottom:0vmin;
width:1vmin;
height:1vmin;
background-color:rgb(255,251,0);
border-radius:50%;
filter:blur(0.2vmin);
animation:light-ans 4s linear infinite backwards;
}

@keyframes light-ans{
0%{
opacity:0;
transform:translateY(0vmin);
}
25%{
opacity:1;
transform:translateY(-5vmin) translateX(-2vmin);
}
50%{
opacity:1;
transform:translateY(-15vmin) translateX(2vmin);
}
75%{
transform:translateY(-20vmin) translateX(-2vmin);
}
100%{
transform:translateY(-30vmin);
opacity:0;
}
}

/* MOVIMIENTO FLORES */

.flower--1{
animation:moving-flower-1 4s linear infinite;
}

.flower--2{
left:50%;
transform:rotate(20deg);
animation:moving-flower-2 4s linear infinite;
}

.flower--3{
left:50%;
transform:rotate(-15deg);
animation:moving-flower-3 4s linear infinite;
}

@keyframes moving-flower-1{
0%,100%{transform:rotate(2deg);}
50%{transform:rotate(-2deg);}
}

@keyframes moving-flower-2{
0%,100%{transform:rotate(18deg);}
50%{transform:rotate(14deg);}
}

@keyframes moving-flower-3{
0%,100%{transform:rotate(-18deg);}
50%{transform:rotate(-20deg) rotateY(-10deg);}
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="Mac Miller - Planet God Damn (feat. Njomza).mp3" type="audio/mpeg">
</audio>

<div class="night"></div>

<div class="flowers">

<div class="flower flower--1">
<div class="flower__leafs">
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>

<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
</div>

<div class="flower__line"></div>
</div>


<div class="flower flower--2">
<div class="flower__leafs">
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>

<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
</div>

<div class="flower__line"></div>
</div>


<div class="flower flower--3">
<div class="flower__leafs">
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>
<div class="flower__leaf"></div>

<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
<div class="flower__light"></div>
</div>

<div class="flower__line"></div>
</div>

</div>

<div class="message">
Estas flores amarillas son para ti Dra foquita 🌼  
se que no es mucho pero algo es algo 🦭
</div>

<script>

const audio=document.getElementById("music");

function fadeInAudio(){

audio.volume=0;
audio.play();

let vol=0;

const fade=setInterval(()=>{
if(vol<1){
vol+=0.02;
audio.volume=vol;
}else{
clearInterval(fade);
}
},200);

}

document.addEventListener("click",fadeInAudio);

</script>

</body>
</html>
